<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagonal mesh forming arrow shape -->
  <defs>
    <polygon id="hex" points="60,20 90,20 105,50 90,80 60,80 45,50" fill="#14E8C5" stroke="#0A5C6B" stroke-width="8"/>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0A7C6B"/>
    </marker>
  </defs>

  <!-- Hex grid forming stylized forward arrow -->
  <use href="#hex" transform="translate(40,100)"/>
  <use href="#hex" transform="translate(40,180)"/>
  
  <use href="#hex" transform="translate(110,60)"/>
  <use href="#hex" transform="translate(110,140)"/>
  <use href="#hex" transform="translate(110,220)"/>
  
  <use href="#hex" transform="translate(180,40)"/>
  <use href="#hex" transform="translate(180,120)"/>
  <use href="#hex" transform="translate(180,200)"/>

  <!-- Highlighted central skill node -->
  <circle cx="195" cy="175" r="28" fill="#00D4FF" opacity="0.95"/>
  <circle cx="195" cy="175" r="18" fill="#FFFFFF"/>

  <!-- Deployment flow arrows -->
  <path d="M90 145 L140 145" fill="none" stroke="#0A7C6B" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M160 175 L210 175" fill="none" stroke="#0A7C6B" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M230 205 L280 205" fill="none" stroke="#0A7C6B" stroke-width="6" marker-end="url(#arrow)"/>
  
  <path d="M135 120 L135 90" fill="none" stroke="#0A7C6B" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M205 155 L205 125" fill="none" stroke="#0A7C6B" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- SkillPack text -->
  <text x="200" y="340" text-anchor="middle" fill="#0A5C6B" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" letter-spacing="-2px">SkillPack</text>
</svg>
