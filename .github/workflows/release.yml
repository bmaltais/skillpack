name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  audit-smoke:
    name: Audit Generation Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify audit events are generated
        # AU-12: confirm the audit mechanism emits at least one structured record.
        # `go test` exercises internal/audit which calls Log() and asserts JSON output.
        run: |
          go test ./internal/audit/... -v 2>&1 | tee audit-smoke.log
          grep -q '"event"' audit-smoke.log || (echo "ERROR: no audit event emitted during test run" && exit 1)

  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate version
        id: version
        run: |
          VERSION="v$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/skillpack-linux-amd64      ./cmd/skillpack
          GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/skillpack-linux-arm64      ./cmd/skillpack
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/skillpack-windows-amd64.exe ./cmd/skillpack
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/skillpack-windows-arm64.exe ./cmd/skillpack
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/skillpack-darwin-amd64    ./cmd/skillpack
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/skillpack-darwin-arm64    ./cmd/skillpack

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/skillpack-linux-amd64
            dist/skillpack-linux-arm64
            dist/skillpack-windows-amd64.exe
            dist/skillpack-windows-arm64.exe
            dist/skillpack-darwin-amd64
            dist/skillpack-darwin-arm64
